name: CI — homeflow-ai-service

on:
  push:
    branches: [main, develop]
    paths:
      - "homeflow-ai-service/**"
      - ".github/workflows/ci-ai-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "homeflow-ai-service/**"

defaults:
  run:
    working-directory: homeflow-ai-service

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: homeflow-ai-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest httpx
      - run: ruff check app/
      - run: pytest tests/ -v --tb=short || echo "No tests yet"

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: homeflow-ai-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeflow-ai-service:latest,ghcr.io/${{ github.repository_owner }}/homeflow-ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
