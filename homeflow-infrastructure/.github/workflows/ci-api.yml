name: CI — homeflow-api

on:
  push:
    branches: [main, develop]
    paths:
      - "homeflow-api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "homeflow-api/**"

defaults:
  run:
    working-directory: homeflow-api

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: homeflow-api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: homeflow-api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: homeflow-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeflow-api:latest,ghcr.io/${{ github.repository_owner }}/homeflow-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
