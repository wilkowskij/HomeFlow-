name: CI — homeflow-web

on:
  push:
    branches: [main, develop]
    paths:
      - "homeflow-web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "homeflow-web/**"

defaults:
  run:
    working-directory: homeflow-web

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: homeflow-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: homeflow-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: homeflow-web/dist

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: homeflow-web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/homeflow-web:latest,ghcr.io/${{ github.repository_owner }}/homeflow-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
